events {}

http {
    server {
        listen 8080;
        server_name localhost;

        location /web/ {
            proxy_pass http://127.0.0.1:8000/web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
