events {}

http {
    upstream django_app {
        server web:8000;
    }

    server {
        listen 80;
        server_name localhost;

        location /web/ {
            proxy_pass http://django_app/web/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/ {
            proxy_pass http://django_app/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
